<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My First HTML Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }
        .container {
            background-color: white;
            width: 60%;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        button {
            background-color: blue;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Website</h1>

        <p>This is a simple HTML example webpage.</p>

        <h2>About Me</h2>
        <p>My name is Rohit. I am learning HTML, CSS, and JavaScript.</p>

        <h2>My Skills</h2>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
            <li>Python</li>
        </ul>

        <h2>Visit Google</h2>
        <a href="https://www.google.com" target="_blank">Click here to open Google</a>

        <br><br>

        <img src="https://via.placeholder.com/200" alt="Sample Image">

        <br><br>

        <button onclick="showMessage()">Click Me</button>
    </div>

    <script>
        function showMessage() {
            alert("Hello Rohit! Welcome to HTML.");
        }
    </script>

</body>
</html>
